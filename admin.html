<!DOCTYPE html>
<html>
<head>
    <title>Lead Dashboard</title>

    <style>
        body{
            font-family:Arial;
            padding:20px;
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        th,td{
            border:1px solid #ddd;
            padding:10px;
            text-align:left;
        }

        th{
            background:#2563eb;
            color:white;
        }
    </style>
</head>

<body>

<h1>Lead Dashboard</h1>

<table>
    <thead>
        <tr>
            <th>Name</th>
            <th>Mobile</th>
            <th>Email</th>
            <th>Business</th>
        </tr>
    </thead>

    <tbody id="leadTable">
    </tbody>
</table>

</body>
</html>
