<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Voice Agent Inquiry Form</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f6f9;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:700px;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 4px 20px rgba(0,0,0,.1);
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.form-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:6px;
    font-weight:bold;
}

input, textarea{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
}

textarea{
    min-height:100px;
}

button{
    width:100%;
    padding:14px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.success{
    display:none;
    text-align:center;
}

.success h2{
    color:green;
}
</style>
</head>
<body>

<div class="container">

<div id="formSection">

<h1>AI Voice Agent Inquiry Form</h1>

<form id="leadForm">

<div class="form-group">
<label>Full Name</label>
<input type="text" id="name" required>
</div>

<div class="form-group">
<label>Mobile Number</label>
<input type="text" id="mobile" required>
</div>

<div class="form-group">
<label>Email</label>
<input type="email" id="email" required>
</div>

<div class="form-group">
<label>Address</label>
<textarea id="address" required></textarea>
</div>

<div class="form-group">
<label>Business Name</label>
<input type="text" id="business">
</div>

<div class="form-group">
<label>Business Type</label>
<input type="text" id="businessType">
</div>

<div class="form-group">
<label>Requirements</label>
<textarea id="requirements"></textarea>
</div>

<button type="submit">Submit</button>

</form>

</div>

<div id="successSection" class="success">
<h2>✅ Lead Submitted Successfully</h2>
<p>Your details have been stored.</p>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCK1Kv8LyL5W4FUs6DvM3ZYWf9XFSo9LUM",
  authDomain: "aivoiceagent-85e92.firebaseapp.com",
  projectId: "aivoiceagent-85e92",
  storageBucket: "aivoiceagent-85e92.firebasestorage.app",
  messagingSenderId: "628193385255",
  appId: "1:628193385255:web:ab0dfee3ed17e04eb16702"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

document.getElementById("leadForm").addEventListener("submit", async (e) => {

    e.preventDefault();

    try {

        await addDoc(collection(db, "leads"), {
            name: document.getElementById("name").value,
            mobile: document.getElementById("mobile").value,
            email: document.getElementById("email").value,
            address: document.getElementById("address").value,
            business: document.getElementById("business").value,
            businessType: document.getElementById("businessType").value,
            requirements: document.getElementById("requirements").value,
            createdAt: new Date().toISOString()
        });

        document.getElementById("formSection").style.display = "none";
        document.getElementById("successSection").style.display = "block";

    } catch (error) {

        console.error(error);
        alert("Error: " + error.message);

    }

});

</script>

</body>
</html>
